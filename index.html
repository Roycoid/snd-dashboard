<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SND Zone Finder - Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background-color: #1e1e1e;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        h1 { color: #f39c12; margin: 0; font-size: 28px; }
        p.subtitle { color: #888; margin-top: 5px; }
        
        .stats-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .stat-card {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            width: 150px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .stat-card h3 { margin: 0; color: #aaa; font-size: 14px; }
        .stat-card p { margin: 10px 0 0 0; font-size: 24px; font-weight: bold; }
        .text-green { color: #2ecc71; }
        .text-red { color: #e74c3c; }
        .text-blue { color: #3498db; }

        .table-container {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #1e1e1e;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            min-width: 800px;
        }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #333; }
        th { background-color: #2c3e50; color: #fff; font-weight: 600; }
        tr:hover { background-color: #2a2a2a; }
        
        .badge {
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
        }
        .bg-approved { background-color: rgba(46, 204, 113, 0.2); color: #2ecc71; border: 1px solid #2ecc71; }
        .bg-rejected { background-color: rgba(231, 76, 60, 0.2); color: #e74c3c; border: 1px solid #e74c3c; }
        .bg-buy { background-color: rgba(52, 152, 219, 0.2); color: #3498db; }
        .bg-sell { background-color: rgba(230, 126, 34, 0.2); color: #e67e22; }
    </style>
</head>
<body>

    <div class="header">
        <h1>💎 SND Zone Finder - AI Dashboard</h1>
        <p class="subtitle">Live Trading Signals & Gemini Validation Log</p>
    </div>

    <div class="stats-container">
        <div class="stat-card">
            <h3>TOTAL SINYAL</h3>
            <p id="stat-total" class="text-blue">0</p>
        </div>
        <div class="stat-card">
            <h3>DISETUJUI AI</h3>
            <p id="stat-approved" class="text-green">0</p>
        </div>
        <div class="stat-card">
            <h3>DITOLAK AI</h3>
            <p id="stat-rejected" class="text-red">0</p>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Waktu (Server)</th>
                    <th>Pair</th>
                    <th>Arah</th>
                    <th>Zona</th>
                    <th>Entry</th>
                    <th>Status AI</th>
                    <th>Alasan Gemini</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <tr><td colspan="7" style="text-align: center;">Mengambil data dari Firebase...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        // URL Realtime Database Firebase Anda (sudah saya masukkan!)
        const FIREBASE_URL = "https://sndfinder-default-rtdb.asia-southeast1.firebasedatabase.app/signals.json";

        async function fetchSignals() {
            try {
                const response = await fetch(FIREBASE_URL);
                const data = await response.json();
                
                const tableBody = document.getElementById("table-body");
                let total = 0, approved = 0, rejected = 0;
                
                if (!data) {
                    tableBody.innerHTML = "<tr><td colspan='7' style='text-align: center;'>Belum ada data sinyal terekam. Biarkan EA Anda berjalan dan mendeteksi sinyal.</td></tr>";
                    return;
                }

                // Ubah data object menjadi array dan urutkan dari yang terbaru
                const signalsArray = Object.values(data).sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                
                tableBody.innerHTML = ""; // Bersihkan tabel
                
                signalsArray.forEach(sig => {
                    total++;
                    if (sig.status === "APPROVED_BY_AI") approved++;
                    if (sig.status === "REJECTED_BY_AI") rejected++;

                    const statusBadge = sig.status === "APPROVED_BY_AI" 
                        ? `<span class="badge bg-approved">✅ DISETUJUI</span>` 
                        : `<span class="badge bg-rejected">❌ DITOLAK</span>`;
                    
                    const typeBadge = sig.signal_type.toLowerCase() === "buy"
                        ? `<span class="badge bg-buy">📈 BUY</span>`
                        : `<span class="badge bg-sell">📉 SELL</span>`;

                    const row = `
                        <tr>
                            <td>${sig.timestamp}</td>
                            <td><strong>${sig.symbol}</strong></td>
                            <td>${typeBadge}</td>
                            <td>${sig.zone}</td>
                            <td>${sig.entry}</td>
                            <td>${statusBadge}</td>
                            <td style="max-width: 300px; font-size: 13px; color: #bbb; line-height: 1.4;">${sig.ai_reason}</td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });

                // Update Statistik Dasbor
                document.getElementById("stat-total").innerText = total;
                document.getElementById("stat-approved").innerText = approved;
                document.getElementById("stat-rejected").innerText = rejected;

            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById("table-body").innerHTML = "<tr><td colspan='7' style='text-align: center; color: #e74c3c;'>Gagal terhubung ke Firebase. Periksa koneksi internet Anda.</td></tr>";
            }
        }

        // Ambil data pertama kali
        fetchSignals();
        // Otomatis refresh data setiap 10 detik secara diam-diam
        setInterval(fetchSignals, 10000);
    </script>

</body>
</html>
