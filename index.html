<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SND AI Dashboard</title>
    <style>
        /* Gaya Tampilan Dasar */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Tampilan Kotak Login */
        #login-section {
            background-color: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
        }
        #login-section h2 { margin-bottom: 5px; color: #1a73e8; }
        #login-section p { font-size: 12px; color: #666; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            background-color: #e8f0fe;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-login:hover { background-color: #1557b0; }
        #error-msg {
            color: red;
            font-size: 12px;
            margin-top: 15px;
            font-weight: bold;
            display: none;
        }

        /* Tampilan Dashboard Utama (Disembunyikan di awal) */
        #dashboard-section {
            display: none;
            width: 100%;
            height: 100vh;
            background-color: #ffffff;
            padding: 20px;
            box-sizing: border-box;
        }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f4f6f9; padding-bottom: 10px; }
        .header h1 { color: #333; margin: 0; }
        .btn-logout { background-color: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        
        .content { margin-top: 30px; text-align: center; }
        .btn-ai {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-ai:hover { background-color: #218838; }

        /* Tombol Chat Mengambang */
        .floating-chat {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #1a73e8;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            font-size: 24px;
        }
    </style>
</head>
<body>

    <!-- KOTAK LOGIN -->
    <div id="login-section">
        <h2>🔒 SND AI Login</h2>
        <p>Akses khusus administrator (Private)</p>
        
        <div class="input-group">
            <input type="email" id="email" placeholder="Masukkan Email Anda">
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Masukkan Kata Sandi">
        </div>
        
        <button class="btn-login" id="btn-login">Masuk ke Dashboard</button>
        <p id="error-msg">Akses Ditolak: Email atau sandi salah!</p>
    </div>

    <!-- DASHBOARD UTAMA -->
    <div id="dashboard-section">
        <div class="header">
            <h1>SND Dashboard V8.5</h1>
            <button class="btn-logout" id="btn-logout">Keluar (Logout)</button>
        </div>
        
        <div class="content">
            <h2>Selamat Datang, Admin VIP!</h2>
            <p>Sistem Firebase Anda sudah terhubung dengan sempurna.</p>
            <br>
            <button class="btn-ai" id="btn-ai">✨ Analisa AI (Tarik Data MT5)</button>
        </div>

        <div class="floating-chat">💬</div>
    </div>

    <!-- SCRIPT FIREBASE -->
    <script type="module">
        // 1. Import library Firebase langsung dari server Google (tanpa NPM)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // 2. KUNCI RAHASIA FIREBASE ANDA
        const firebaseConfig = {
            apiKey: "AIzaSyB7pBQh1_yIBBucfiGNJqn6Kn9SrNZu7rE",
            authDomain: "sndfinder.firebaseapp.com",
            databaseURL: "https://sndfinder-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "sndfinder",
            storageBucket: "sndfinder.firebasestorage.app",
            messagingSenderId: "487128628698",
            appId: "1:487128628698:web:b21eda0312f24af20f54e3",
            measurementId: "G-CRXFBJGVCF"
        };

        // 3. Menghidupkan Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);

        // 4. Hubungkan elemen HTML ke Javascript
        const loginSection = document.getElementById('login-section');
        const dashboardSection = document.getElementById('dashboard-section');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const btnLogin = document.getElementById('btn-login');
        const btnLogout = document.getElementById('btn-logout');
        const errorMsg = document.getElementById('error-msg');

        // 5. Cek apakah pengguna sudah login atau belum
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Jika sudah login, sembunyikan kotak login, tampilkan dashboard
                loginSection.style.display = 'none';
                dashboardSection.style.display = 'block';
                // Reset body style agar dashboard berada di atas
                document.body.style.display = 'block'; 
                document.body.style.height = 'auto';
            } else {
                // Jika belum login, tampilkan kotak login
                loginSection.style.display = 'block';
                dashboardSection.style.display = 'none';
                document.body.style.display = 'flex';
                document.body.style.height = '100vh';
            }
        });

        // 6. Fungsi tombol Login ditekan
        btnLogin.addEventListener('click', () => {
            const email = emailInput.value;
            const password = passwordInput.value;
            
            // Sembunyikan pesan error sebelumnya
            errorMsg.style.display = 'none';
            btnLogin.innerText = 'Memeriksa...';

            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    // Berhasil masuk
                    btnLogin.innerText = 'Masuk ke Dashboard';
                })
                .catch((error) => {
                    // Gagal masuk (Sandi/Email salah)
                    errorMsg.style.display = 'block';
                    errorMsg.innerText = "Error: " + error.message;
                    btnLogin.innerText = 'Masuk ke Dashboard';
                });
        });

        // 7. Fungsi tombol Logout ditekan
        btnLogout.addEventListener('click', () => {
            signOut(auth).then(() => {
                // Bersihkan isian login setelah keluar
                emailInput.value = '';
                passwordInput.value = '';
            });
        });

        // 8. Fungsi dummy tombol AI (Bisa Anda kembangkan nanti)
        document.getElementById('btn-ai').addEventListener('click', () => {
            alert('Perintah dikirim ke MetaTrader 5! Sedang memuat Analisa AI...');
        });
    </script>
</body>
</html>
