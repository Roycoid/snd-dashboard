<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SND AI Trading Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #4facfe;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }
        .card {
            background-color: #1e1e1e;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            border-left: 5px solid #4facfe;
        }
        .time {
            font-size: 0.85em;
            color: #aaaaaa;
            margin-bottom: 10px;
        }
        .symbol {
            font-size: 1.2em;
            font-weight: bold;
            color: #fdd835;
        }
        .price {
            font-size: 1.1em;
            color: #00e676;
            margin-bottom: 15px;
        }
        .analysis {
            line-height: 1.6;
            color: #e0e0e0;
        }
        .loading {
            text-align: center;
            font-style: italic;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📊 SND AI Market Report</h1>
        <div id="report-container">
            <p class="loading">Memuat data dari Firebase...</p>
        </div>
    </div>

    <script>
        // URL Firebase kamu
        const FIREBASE_URL = "https://sndfinder-default-rtdb.asia-southeast1.firebasedatabase.app/market_report.json";

        async function loadReports() {
            try {
                // Mengambil data dari Firebase
                const response = await fetch(FIREBASE_URL);
                const data = await response.json();
                
                const container = document.getElementById('report-container');
                container.innerHTML = ''; // Bersihkan tulisan loading

                if (data) {
                    // Mengubah data object Firebase menjadi array agar bisa diurutkan
                    const reportsArray = Object.values(data);
                    
                    // Mengurutkan dari yang terbaru ke yang terlama
                    reportsArray.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

                    // Menampilkan 10 laporan terbaru
                    reportsArray.slice(0, 10).forEach(report => {
                        const card = document.createElement('div');
                        card.className = 'card';
                        
                        card.innerHTML = `
                            <div class="time">🕒 ${report.timestamp}</div>
                            <div class="symbol">Instrumen: ${report.symbol}</div>
                            <div class="price">Harga Saat Ini: ${report.price}</div>
                            <div class="analysis">${report.analysis}</div>
                        `;
                        container.appendChild(card);
                    });
                } else {
                    container.innerHTML = '<p class="loading">Belum ada data laporan pasar.</p>';
                }
            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('report-container').innerHTML = '<p class="loading" style="color: red;">Gagal memuat data. Periksa koneksi internet atau URL Firebase.</p>';
            }
        }

        // Jalankan fungsi saat halaman dimuat
        loadReports();
        
        // Perbarui data otomatis setiap 60 detik
        setInterval(loadReports, 60000);
    </script>

</body>
</html>
